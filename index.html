<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0a1f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Favicon / PWA Icons -->
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Engly" />
    
    <title>Engly</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .letter-btn { touch-action: manipulation; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .modal-scroll { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent; }
        .modal-scroll::-webkit-scrollbar { width: 6px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
    </style>
</head>
<body class="bg-[#0f0a1f] min-h-screen text-white">
    
    <!-- Background Gradient -->
    <div class="fixed inset-0 bg-gradient-to-b from-[#0f0a1f] via-[#1a103c] to-[#0f0a1f] pointer-events-none"></div>
    
    <div x-data="app()" x-init="init()" x-cloak class="min-h-screen flex flex-col relative z-10">
        
        <!-- Header -->
        <header class="px-4 pt-4 pb-2">
            <div class="max-w-md mx-auto">
                <div class="flex items-center justify-between mb-3">
                    <h1 class="text-2xl font-bold flex items-center gap-2">
                        <i class="fas fa-book-open text-indigo-400"></i>
                        Engly
                    </h1>
                    <div class="flex items-center gap-1">
                        <!-- Sync Button -->
                        <button @click="syncWithSheet()" 
                                x-show="needsSync"
                                x-transition
                                class="px-3 py-1.5 bg-amber-500 hover:bg-amber-400 text-white rounded-xl text-sm font-semibold transition-colors flex items-center gap-1.5"
                                :disabled="syncing">
                            <i class="fas" :class="syncing ? 'fa-circle-notch fa-spin' : 'fa-cloud-upload-alt'"></i>
                            <span x-text="syncing ? 'Сохранение...' : 'Сохранить'"></span>
                        </button>
                        <!-- Dictionary Button -->
                        <button @click="showDictionary = true" class="p-2 hover:bg-white/10 rounded-full transition-colors ml-1" title="Словарь">
                            <i class="fas fa-list text-indigo-300"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Stats Bar -->
                <div class="grid grid-cols-3 gap-2 text-center text-xs">
                    <div class="bg-white/10 rounded-xl p-2 backdrop-blur-sm">
                        <div class="text-indigo-300 font-bold text-lg" x-text="stats.todayCorrect"></div>
                        <div class="text-white/60">Верно за сегодня</div>
                    </div>
                    <div class="bg-white/10 rounded-xl p-2 backdrop-blur-sm">
                        <div class="text-red-300 font-bold text-lg" x-text="stats.todayWrong"></div>
                        <div class="text-white/60">Ошибок за сегодня</div>
                    </div>
                    <div class="bg-white/10 rounded-xl p-2 backdrop-blur-sm">
                        <div class="text-yellow-300 font-bold text-lg" x-text="positivePercent + '%'"></div>
                        <div class="text-white/60">Словаря выучено</div>
                    </div>
                </div>
            </div>
        </header>
        
        <!-- Main Content -->
        <main class="flex-1 flex flex-col items-center justify-center px-4 py-8">
            <div class="max-w-md w-full mx-auto">
                
                <!-- Word Card -->
                <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-6 mb-6 border border-white/20 shadow-2xl">
                    <div class="text-center">
                        <div class="text-white/60 text-sm mb-2">Переведите слово</div>
                        <h2 class="text-3xl font-bold mb-6" x-text="currentWord?.russian || 'Загрузка...'"></h2>
                        
                        <!-- Answer Area -->
                        <div class="min-h-[60px] bg-white/5 rounded-2xl p-4 mb-4 border border-white/10">
                            <div class="flex flex-wrap justify-center gap-2" x-show="answer.length > 0">
                                <template x-for="(letter, index) in answer" :key="index">
                                    <span class="inline-flex items-center justify-center w-10 h-10 bg-indigo-500 rounded-xl font-bold text-lg shadow-lg"
                                          x-text="letter"></span>
                                </template>
                            </div>
                            <div class="text-white/30 text-center" x-show="answer.length === 0">
                                Составьте слово из букв ниже
                            </div>
                        </div>
                        
                        <!-- Feedback -->
                        <div x-show="feedback" 
                             x-transition
                             class="h-8 flex items-center justify-center gap-2 font-semibold"
                             :class="feedbackType === 'correct' ? 'text-green-400' : 'text-red-400'">
                            <i :class="feedbackType === 'correct' ? 'fas fa-check-circle' : 'fas fa-times-circle'"></i>
                            <span x-text="feedback"></span>
                        </div>
                    </div>
                </div>
                
                <!-- Letters -->
                <div class="flex flex-wrap justify-center gap-2" x-show="letters.length > 0">
                    <template x-for="(letter, index) in letters" :key="index">
                        <button @click="addLetter(letter, index)" 
                                :disabled="usedLetters.includes(index)"
                                class="letter-btn w-12 h-12 bg-gradient-to-br from-indigo-400 to-purple-500 hover:from-indigo-300 hover:to-purple-400 
                                       disabled:opacity-30 disabled:cursor-not-allowed
                                       rounded-2xl font-bold text-xl shadow-lg
                                       transform active:scale-95 transition-all duration-150
                                       border border-white/20">
                            <span x-text="letter"></span>
                        </button>
                    </template>
                </div>
                
                <!-- Action Buttons -->
                <div class="flex gap-3 mt-6">
                    <button @click="clearAnswer()" 
                            class="flex-1 py-3 bg-white/10 hover:bg-white/20 rounded-2xl font-semibold transition-colors border border-white/20">
                        <i class="fas fa-undo mr-2"></i>Стереть
                    </button>
                    <button @click="checkAnswer()" 
                            class="flex-1 py-3 bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-400 hover:to-emerald-400 rounded-2xl font-semibold transition-colors shadow-lg">
                        <i class="fas fa-check mr-2"></i>Проверить
                    </button>
                </div>
                
                <!-- Skip Button -->
                <button @click="skipWord()" class="w-full mt-3 py-3 text-white/50 hover:text-white transition-colors text-sm">
                    <i class="fas fa-forward mr-2"></i>Пропустить слово
                </button>
            </div>
        </main>
        
        <!-- Safe Area Bottom -->
        <div class="safe-area-bottom"></div>
        
        <!-- Dictionary Modal -->
        <div x-show="showDictionary"
             x-cloak
             class="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4 bg-black/60 backdrop-blur-sm"
             @click.self="showDictionary = false"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0">
            
            <div class="bg-slate-800 rounded-t-3xl sm:rounded-3xl w-full max-w-md max-h-[85vh] overflow-hidden flex flex-col"
                 @click.stop
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="translate-y-full"
                 x-transition:enter-end="translate-y-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="translate-y-0"
                 x-transition:leave-end="translate-y-full">
                
                <!-- Modal Header -->
                <div class="flex items-center justify-between px-4 py-3 sm:px-6 sm:py-4 border-b border-white/10">
                    <h2 class="text-lg sm:text-xl font-bold flex items-center gap-2">
                        <i class="fas fa-list text-indigo-400"></i>
                        Словарь
                    </h2>
                    <button @click="showDictionary = false" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <!-- Sort Controls -->
                <div class="px-4 py-3 sm:px-6 sm:py-4 border-b border-white/10">
                    <div class="flex gap-2">
                        <button @click="sortMode = 'russian'" 
                                :class="sortMode === 'russian' ? 'bg-indigo-500 text-white' : 'bg-white/10 text-white/70'"
                                class="flex-1 py-2 rounded-xl text-sm font-medium transition-colors">
                            <i class="fas fa-sort-alpha-down mr-1"></i>Русский
                        </button>
                        <button @click="sortMode = 'english'" 
                                :class="sortMode === 'english' ? 'bg-indigo-500 text-white' : 'bg-white/10 text-white/70'"
                                class="flex-1 py-2 rounded-xl text-sm font-medium transition-colors">
                            <i class="fas fa-sort-alpha-down mr-1"></i>English
                        </button>
                        <button @click="sortMode = 'rating'" 
                                :class="sortMode === 'rating' ? 'bg-indigo-500 text-white' : 'bg-white/10 text-white/70'"
                                class="flex-1 py-2 rounded-xl text-sm font-medium transition-colors">
                            <i class="fas fa-sort-numeric-down mr-1"></i>Рейтинг
                        </button>
                    </div>
                </div>

                <!-- Words List -->
                <div class="flex-1 overflow-y-auto sm:px-4 sm:pb-4 modal-scroll">
                    <template x-for="(word, index) in sortedWords" :key="index">
                        <div class="flex items-center justify-between px-4 py-3 sm:px-3 sm:py-2 sm:bg-white/5 sm:rounded-xl sm:mb-2 sm:border-b-0 border-b border-white/5">
                            <div class="flex-1 min-w-0">
                                <div class="font-semibold truncate" x-text="word.english"></div>
                                <div class="text-xs text-white/50 truncate" x-text="word.russian"></div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-white/50">Рейтинг:</span>
                                <span class="px-2 py-1 rounded-lg text-xs font-bold"
                                      :class="word.displayRating > 0 ? 'bg-green-500/20 text-green-400' :
                                              word.displayRating < 0 ? 'bg-red-500/20 text-red-400' :
                                              'bg-white/10 text-white/60'"
                                      x-text="word.displayRating > 0 ? '+' + word.displayRating : word.displayRating"></span>
                            </div>
                        </div>
                    </template>
                    <div x-show="words.length === 0" class="text-center text-white/40 py-8">
                        <i class="fas fa-book-open text-4xl mb-3"></i>
                        <p>Словарь пуст</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const SYNC_URL = 'https://script.google.com/macros/s/AKfycbzPlg2UGAFIky4g_kIR9SoS8T0de0HUaBiQ9nLUaIq0wj8oGOLZFADP1Xr8Tt2r4CR8/exec';
        
        function app() {
            return {
                words: [],
                delta: {},  // Изменения рейтингов: { "кошка|cat": 5 }
                stats: {
                    todayCorrect: 0,
                    todayWrong: 0,
                    lastSessionDate: null
                },
                currentWord: null,
                answer: [],
                letters: [],
                usedLetters: [],
                feedback: '',
                feedbackType: 'correct',
                showDictionary: false,
                needsSync: false,
                syncing: false,
                sortMode: 'russian',
                
                get positivePercent() {
                    if (this.words.length === 0) return 0;
                    const positive = this.words.filter(w => this.getRating(w) > 0).length;
                    return Math.round((positive / this.words.length) * 100);
                },
                
                get positiveWords() {
                    return this.words.filter(w => this.getRating(w) > 0).length;
                },
                
                get negativeWords() {
                    return this.words.filter(w => this.getRating(w) < 0).length;
                },
                
                get sortedWords() {
                    const sorted = [...this.words].map(w => ({
                        ...w,
                        displayRating: this.getRating(w)
                    }));
                    if (this.sortMode === 'russian') {
                        sorted.sort((a, b) => a.russian.localeCompare(b.russian, 'ru'));
                    } else if (this.sortMode === 'english') {
                        sorted.sort((a, b) => a.english.localeCompare(b.english, 'en'));
                    } else if (this.sortMode === 'rating') {
                        sorted.sort((a, b) => this.getRating(b) - this.getRating(a));
                    }
                    return sorted;
                },
                
                // Получить рейтинг слова с учётом дельты
                getRating(word) {
                    const key = this.wordKey(word);
                    const baseRating = word.rating || 0;
                    const deltaRating = this.delta[key] || 0;
                    return baseRating + deltaRating;
                },
                
                // Уникальный ключ для слова
                wordKey(word) {
                    return `${word.russian}|${word.english}`;
                },
                
                async init() {
                    // 1. Мгновенная загрузка из localStorage
                    this.loadFromStorage();
                    this.checkNewDay();
                    
                    // 2. Выбираем слово сразу (работаем оффлайн)
                    this.selectWord();
                    
                    // 3. Фоновая загрузка словаря из таблицы (не блокирует)
                    await this.loadDictionary();
                    
                    // Register service worker
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.register('sw.js');
                    }
                },
                
                loadFromStorage() {
                    // Загружаем словарь (база)
                    const savedWords = localStorage.getItem('engly_words');
                    if (savedWords) {
                        this.words = JSON.parse(savedWords);
                    }
                    
                    // Загружаем дельту изменений
                    const savedDelta = localStorage.getItem('engly_delta');
                    if (savedDelta) {
                        this.delta = JSON.parse(savedDelta);
                        this.updateNeedsSync();
                    }
                    
                    // Загружаем статистику
                    const savedStats = localStorage.getItem('engly_stats');
                    if (savedStats) {
                        this.stats = JSON.parse(savedStats);
                    }
                },
                
                saveToStorage() {
                    localStorage.setItem('engly_words', JSON.stringify(this.words));
                    localStorage.setItem('engly_delta', JSON.stringify(this.delta));
                    localStorage.setItem('engly_stats', JSON.stringify(this.stats));
                },
                
                checkNewDay() {
                    const today = new Date().toDateString();
                    if (this.stats.lastSessionDate !== today) {
                        this.stats.todayCorrect = 0;
                        this.stats.todayWrong = 0;
                        this.stats.lastSessionDate = today;
                        this.saveToStorage();
                    }
                },
                
                // Загрузка словаря из таблицы (фон)
                async loadDictionary() {
                    try {
                        const response = await fetch(SYNC_URL, {
                            method: 'GET',
                            mode: 'cors',
                        });
                        
                        if (!response.ok) throw new Error(`Статус: ${response.status}`);
                        
                        const data = await response.json();
                        if (data.words && data.words.length > 0) {
                            // Сохраняем базовый словарь
                            this.words = data.words;
                            this.saveToStorage();
                            // Дельта остаётся, применяется поверх
                        }
                    } catch (error) {
                        // Тихая ошибка — работаем с локальными данными
                        console.log('Словарь не загружен, работаем оффлайн');
                    }
                },
                
                // Отправка изменений в таблицу
                async syncWithSheet() {
                    this.syncing = true;
                    try {
                        // Применяем дельту к базовым словам
                        const wordsWithDelta = this.words.map(word => ({
                            ...word,
                            rating: this.getRating(word)
                        }));
                        
                        // Отправляем в таблицу
                        const response = await fetch(SYNC_URL, {
                            method: 'POST',
                            mode: 'cors',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ words: wordsWithDelta }),
                        });
                        
                        if (!response.ok) throw new Error(`Статус: ${response.status}`);
                        
                        const result = await response.json();
                        if (!result.success) throw new Error(result.error);
                        
                        // Загружаем подтверждённые данные
                        const getResponse = await fetch(SYNC_URL, {
                            method: 'GET',
                            mode: 'cors',
                        });
                        
                        const getData = await getResponse.json();
                        this.words = getData.words || [];
                        this.delta = {};  // Сбрасываем дельту
                        this.saveToStorage();
                        this.updateNeedsSync();
                        
                    } catch (error) {
                        console.error('Ошибка синхронизации:', error);
                    } finally {
                        this.syncing = false;
                    }
                },
                
                updateNeedsSync() {
                    const hasChanges = Object.keys(this.delta).length > 0;
                    this.needsSync = hasChanges;
                },
                
                selectWord() {
                    if (this.words.length === 0) {
                        this.currentWord = null;
                        return;
                    }
                    
                    const totalWeight = this.words.reduce((sum, word) => {
                        const rating = this.getRating(word);
                        return sum + (10 - rating);
                    }, 0);
                    
                    let random = Math.random() * totalWeight;
                    for (const word of this.words) {
                        random -= (10 - this.getRating(word));
                        if (random <= 0) {
                            this.currentWord = word;
                            break;
                        }
                    }
                    
                    this.generateLetters();
                    this.answer = [];
                    this.usedLetters = [];
                    this.feedback = '';
                },
                
                generateLetters() {
                    if (!this.currentWord) return;
                    
                    const english = this.currentWord.english.toLowerCase().replace(/[^a-z]/g, '');
                    const letters = english.split('');
                    
                    const extraCount = Math.floor(Math.random() * 3) + 2;
                    const alphabet = 'abcdefghijklmnopqrstuvwxyz';
                    for (let i = 0; i < extraCount; i++) {
                        letters.push(alphabet[Math.floor(Math.random() * alphabet.length)]);
                    }
                    
                    this.letters = letters.sort(() => Math.random() - 0.5);
                },
                
                addLetter(letter, index) {
                    if (this.usedLetters.includes(index)) return;
                    
                    this.answer.push(letter);
                    this.usedLetters.push(index);
                },
                
                clearAnswer() {
                    this.answer = [];
                    this.usedLetters = [];
                },
                
                checkAnswer() {
                    if (!this.currentWord || this.answer.length === 0) return;
                    
                    const userAnswer = this.answer.join('').toLowerCase();
                    const correctAnswer = this.currentWord.english.toLowerCase();
                    
                    if (userAnswer === correctAnswer) {
                        this.feedback = 'Правильно! 🎉';
                        this.feedbackType = 'correct';
                        this.updateRating(1);
                        this.stats.todayCorrect++;
                    } else {
                        this.feedback = `Неверно. Правильно: ${correctAnswer}`;
                        this.feedbackType = 'wrong';
                        this.updateRating(-1);
                        this.stats.todayWrong++;
                    }
                    
                    this.saveToStorage();
                    
                    setTimeout(() => {
                        this.selectWord();
                    }, 1500);
                },
                
                updateRating(change) {
                    if (!this.currentWord) return;
                    
                    const key = this.wordKey(this.currentWord);
                    const currentDelta = this.delta[key] || 0;
                    const baseRating = this.currentWord.rating || 0;
                    const effectiveRating = baseRating + currentDelta;
                    
                    let newDelta;
                    if (change > 0) {
                        newDelta = currentDelta + change;
                    } else {
                        // Идём вниз
                        if (effectiveRating >= 5) {
                            // Сброс к 0: дельта = -baseRating
                            newDelta = -baseRating;
                        } else {
                            newDelta = currentDelta + change;
                            // Ограничиваем минимум -10
                            if (baseRating + newDelta < -10) {
                                newDelta = -10 - baseRating;
                            }
                        }
                    }
                    
                    this.delta[key] = newDelta;
                    this.updateNeedsSync();
                    this.saveToStorage();
                },
                
                skipWord() {
                    this.feedback = `Правильно: ${this.currentWord?.english}`;
                    this.feedbackType = 'wrong';
                    setTimeout(() => {
                        this.selectWord();
                    }, 1500);
                }
            }
        }
    </script>
</body>
</html>
